<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="converter-card">
            <h1>Temperature Converter</h1>
            
            <div class="form-group">
                <label for="temperature">Enter Temperature:</label>
                <input 
                    type="number" 
                    id="temperature" 
                    placeholder="e.g., 25" 
                    step="0.01"
                >
            </div>

            <div class="form-group">
                <label>Select Input Unit:</label>
                <div class="unit-options">
                    <label class="radio-label">
                        <input type="radio" name="unit" value="celsius" checked>
                        <span>Celsius (°C)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="unit" value="fahrenheit">
                        <span>Fahrenheit (°F)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="unit" value="kelvin">
                        <span>Kelvin (K)</span>
                    </label>
                </div>
            </div>

            <button id="convertBtn" class="convert-btn">Convert</button>

            <div id="errorMessage" class="error-message"></div>

            <div id="resultContainer" class="result-container">
                <div id="result" class="result-text"></div>
                <div class="conversion-details">
                    <div id="celsiusResult"></div>
                    <div id="fahrenheitResult"></div>
                    <div id="kelvinResult"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
